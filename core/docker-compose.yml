services:
  zt-core-gateway:
    build:
      context: ..
      dockerfile: Dockerfile.zt-gateway
    container_name: zt-core-gateway
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    env_file:
      - .env
    environment:
      ZT_NETWORK_ID: ${ZT_NETWORK_ID}
      CORE_APP_IP: ${CORE_APP_IP:-172.18.0.10}
      FORWARD_PORTS: ${FORWARD_PORTS:-32400/tcp,2456/udp}
      CORE_APP_IFACE: ${CORE_APP_IFACE:-}
      RULE_REAPPLY_INTERVAL: ${RULE_REAPPLY_INTERVAL:-30}
      CORE_ZT_READY_TIMEOUT: ${CORE_ZT_READY_TIMEOUT:-300}
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
      - ./zerotier-one:/var/lib/zerotier-one
    networks:
      app_net:
        ipv4_address: ${GATEWAY_CONTAINER_IP:-172.18.0.2}
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${APP_NETWORK_SUBNET:-172.18.0.0/24}
